<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔍 Detective Game - Misterio Compartido</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1e1e2e 0%, #2d1b3d 100%);
      color: #e0e0e0;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 30px;
      padding: 20px;
    }

    h1 {
      font-size: 2.5em;
      color: #ffd700;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
      margin-bottom: 10px;
    }

    .subtitle {
      color: #b0b0b0;
      font-size: 1.1em;
    }

    /* LOBBY */
    #lobby {
      display: flex;
      flex-direction: column;
      gap: 20px;
      max-width: 600px;
      margin: 0 auto;
    }

    .lobby-box {
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid #ffd700;
      border-radius: 10px;
      padding: 30px;
      backdrop-filter: blur(10px);
    }

    .lobby-box h2 {
      color: #ffd700;
      margin-bottom: 20px;
      font-size: 1.5em;
    }

    .input-group {
      margin-bottom: 15px;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      color: #ffd700;
      font-weight: bold;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px;
      border: 2px solid #ffd700;
      border-radius: 5px;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 1em;
      transition: all 0.3s;
    }

    input[type="text"]:focus {
      outline: none;
      background: rgba(255, 255, 255, 0.2);
      box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
    }

    button {
      padding: 12px 30px;
      border: none;
      border-radius: 5px;
      font-size: 1em;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      width: 100%;
    }

    .btn-primary {
      background: #ffd700;
      color: #1e1e2e;
    }

    .btn-primary:hover {
      background: #ffed4e;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
    }

    .waiting {
      text-align: center;
      padding: 20px;
      color: #ffd700;
      font-size: 1.2em;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* GAME */
    #game {
      display: none;
      gap: 20px;
    }

    .game-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    @media (max-width: 1024px) {
      .game-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 600px) {
      .game-grid {
        grid-template-columns: 1fr;
      }
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      border: 2px solid #ffd700;
      border-radius: 10px;
      padding: 15px;
      cursor: pointer;
      transition: all 0.3s;
      backdrop-filter: blur(10px);
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 20px rgba(255, 215, 0, 0.2);
      background: rgba(255, 255, 255, 0.12);
    }

    .card h3 {
      color: #ffd700;
      margin-bottom: 10px;
      font-size: 1.1em;
    }

    .card p {
      color: #c0c0c0;
      font-size: 0.9em;
      line-height: 1.4;
    }

    .card.discovered {
      border-color: #4ade80;
      background: rgba(74, 222, 128, 0.1);
    }

    .card.discovered h3 {
      color: #4ade80;
    }

    .discovered-by {
      font-size: 0.8em;
      color: #4ade80;
      margin-top: 8px;
      font-style: italic;
    }

    .sidebar {
      background: rgba(255, 255, 255, 0.08);
      border: 2px solid #ffd700;
      border-radius: 10px;
      padding: 20px;
      height: fit-content;
      backdrop-filter: blur(10px);
      position: sticky;
      top: 20px;
    }

    .sidebar h3 {
      color: #ffd700;
      margin-bottom: 15px;
      font-size: 1.2em;
      border-bottom: 2px solid #ffd700;
      padding-bottom: 10px;
    }

    .players-list {
      margin-bottom: 20px;
    }

    .player-badge {
      background: rgba(255, 215, 0, 0.1);
      border: 1px solid #ffd700;
      border-radius: 5px;
      padding: 8px 12px;
      margin-bottom: 8px;
      font-size: 0.9em;
    }

    .player-badge strong {
      color: #ffd700;
    }

    .section {
      margin-bottom: 30px;
    }

    .section-title {
      color: #ffd700;
      font-size: 1.3em;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .clues-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 15px;
    }

    .clue-card {
      background: rgba(255, 255, 255, 0.08);
      border: 2px solid #ff6b6b;
      border-radius: 8px;
      padding: 15px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .clue-card:hover {
      background: rgba(255, 107, 107, 0.15);
      box-shadow: 0 5px 15px rgba(255, 107, 107, 0.2);
    }

    .clue-card.discovered {
      border-color: #4ade80;
      background: rgba(74, 222, 128, 0.1);
    }

    .clue-title {
      color: #ff6b6b;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .clue-card.discovered .clue-title {
      color: #4ade80;
    }

    .clue-content {
      color: #c0c0c0;
      font-size: 0.9em;
      display: none;
    }

    .clue-card.discovered .clue-content {
      display: block;
    }

    .clue-location {
      color: #90b0ff;
      font-size: 0.8em;
      margin-top: 8px;
      font-style: italic;
    }

    .suspects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 15px;
    }

    .suspect-card {
      background: rgba(255, 255, 255, 0.08);
      border: 2px solid #9333ea;
      border-radius: 8px;
      padding: 15px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .suspect-card:hover {
      background: rgba(147, 51, 234, 0.15);
      box-shadow: 0 5px 15px rgba(147, 51, 234, 0.2);
    }

    .suspect-name {
      color: #e9d5ff;
      font-weight: bold;
      font-size: 1.1em;
      margin-bottom: 8px;
    }

    .suspect-role {
      color: #c084fc;
      font-size: 0.9em;
      margin-bottom: 8px;
    }

    .suspect-alibi {
      color: #c0c0c0;
      font-size: 0.85em;
      line-height: 1.3;
      margin-bottom: 10px;
      padding: 10px;
      background: rgba(0, 0, 0, 0.3);
      border-left: 2px solid #c084fc;
    }

    .suspect-secrets {
      color: #ff6b6b;
      font-size: 0.8em;
      display: none;
    }

    .suspect-card.interrogated .suspect-secrets {
      display: block;
    }

    .secret-item {
      margin-bottom: 5px;
      padding: 5px;
      background: rgba(255, 107, 107, 0.1);
      border-left: 2px solid #ff6b6b;
      padding-left: 8px;
    }

    .suspect-motive {
      color: #fbbf24;
      font-size: 0.8em;
      display: none;
      margin-top: 10px;
      padding: 10px;
      background: rgba(251, 191, 36, 0.1);
      border-left: 2px solid #fbbf24;
    }

    .suspect-card.interrogated .suspect-motive {
      display: block;
    }

    .btn-interrogate {
      width: 100%;
      padding: 8px;
      background: #9333ea;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
      font-weight: bold;
      transition: all 0.3s;
    }

    .btn-interrogate:hover {
      background: #a855f7;
    }

    .btn-interrogate:disabled {
      background: #555;
      cursor: not-allowed;
    }

    .btn-accuse {
      width: 100%;
      padding: 10px;
      background: #dc2626;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 8px;
      font-weight: bold;
      transition: all 0.3s;
    }

    .btn-accuse:hover {
      background: #ef4444;
    }

    /* END GAME */
    #end-game {
      display: none;
      max-width: 800px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.1);
      border: 3px solid #ffd700;
      border-radius: 15px;
      padding: 40px;
      text-align: center;
      backdrop-filter: blur(10px);
    }

    #end-game h2 {
      font-size: 2.2em;
      margin-bottom: 20px;
    }

    .result-correct {
      color: #4ade80;
    }

    .result-wrong {
      color: #ff6b6b;
    }

    .result-content {
      text-align: left;
      margin: 30px 0;
      line-height: 1.8;
    }

    .result-content h3 {
      color: #ffd700;
      margin: 20px 0 10px 0;
    }

    .result-content ul {
      margin-left: 20px;
      color: #c0c0c0;
    }

    .result-content li {
      margin-bottom: 8px;
    }

    .accusation-banner {
      background: rgba(255, 215, 0, 0.1);
      border: 2px solid #ffd700;
      border-radius: 8px;
      padding: 20px;
      margin: 20px 0;
      color: #ffd700;
      font-size: 1.2em;
      font-weight: bold;
    }

    .btn-new-game {
      background: #ffd700;
      color: #1e1e2e;
      padding: 15px 40px;
      font-size: 1.1em;
      margin-top: 30px;
    }

    .btn-new-game:hover {
      background: #ffed4e;
    }

    .connection-status {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 10px 15px;
      border-radius: 5px;
      font-size: 0.9em;
      font-weight: bold;
    }

    .status-connected {
      background: #4ade80;
      color: #1e1e2e;
    }

    .status-disconnected {
      background: #ff6b6b;
      color: white;
    }

    .mystery-header {
      background: rgba(255, 215, 0, 0.1);
      border: 2px solid #ffd700;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .mystery-header h2 {
      color: #ffd700;
      margin-bottom: 10px;
    }

    .mystery-header p {
      color: #c0c0c0;
      font-size: 1.05em;
    }

    .importance-high {
      color: #ff6b6b;
      font-weight: bold;
    }

    .importance-media {
      color: #fbbf24;
    }
  </style>
</head>
<body>
  <div class="connection-status status-disconnected" id="connectionStatus">
    ⚫ Desconectado
  </div>

  <div class="container">
    <header>
      <h1>🔍 DETECTIVE GAME</h1>
      <p class="subtitle">Resuelve el misterio junto a tu pareja</p>
    </header>

    <!-- LOBBY -->
    <div id="lobby">
      <div class="lobby-box">
        <h2>Ingresa al Juego</h2>
        <div class="input-group">
          <label for="playerName">Tu nombre:</label>
          <input type="text" id="playerName" placeholder="Ej: Laura" required>
        </div>
        <div class="input-group">
          <label for="roomCode">Código de sala:</label>
          <input type="text" id="roomCode" placeholder="Ej: SALA123" required>
        </div>
        <button class="btn-primary" onclick="joinGame()">Unirse al Juego</button>
      </div>

      <div class="lobby-box">
        <p style="color: #c0c0c0; text-align: center;">
          💡 <strong>Tip:</strong> Comparte el código de sala con tu pareja para que se unan a la misma investigación.
        </p>
      </div>

      <div id="waitingArea" style="display: none;">
        <div class="lobby-box">
          <div class="waiting" id="waitingMessage">
            Esperando al otro detective...
          </div>
        </div>
      </div>
    </div>

    <!-- GAME -->
    <div id="game">
      <div style="display: grid; grid-template-columns: 1fr 300px; gap: 20px;">
        <div>
          <!-- MYSTERY HEADER -->
          <div class="mystery-header" id="mysteryHeader"></div>

          <!-- CLUES SECTION -->
          <div class="section">
            <div class="section-title">📋 Pistas por Descubrir</div>
            <div class="clues-grid" id="cluesContainer"></div>
          </div>

          <!-- SUSPECTS SECTION -->
          <div class="section">
            <div class="section-title">🕵️ Sospechosos</div>
            <div class="suspects-grid" id="suspectsContainer"></div>
          </div>
        </div>

        <!-- SIDEBAR -->
        <div class="sidebar">
          <h3>🎮 Partida</h3>
          <div class="players-list" id="playersList"></div>

          <h3 style="margin-top: 20px;">📊 Progreso</h3>
          <div id="gameStats"></div>
        </div>
      </div>
    </div>

    <!-- END GAME -->
    <div id="end-game">
      <div id="endGameContent"></div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script>
    let socket;
    let roomCode;
    let playerName;
    let gameState = {
      suspects: [],
      clues: [],
      discoveredClues: new Set(),
      interrogations: new Set()
    };

    // Inicializar socket
    function initSocket() {
      socket = io();

      socket.on('connect', () => {
        updateConnectionStatus(true);
      });

      socket.on('disconnect', () => {
        updateConnectionStatus(false);
      });

      socket.on('player-joined', (data) => {
        updatePlayersList(data.players);
        if (data.playerCount === 2) {
          document.getElementById('waitingArea').style.display = 'none';
        }
      });

      socket.on('player-left', (data) => {
        updatePlayersList(data.players);
      });

      socket.on('game-started', (data) => {
        startGame(data);
      });

      socket.on('clue-discovered', (data) => {
        handleClueDiscovered(data);
      });

      socket.on('interrogation-revealed', (data) => {
        handleInterrogation(data);
      });

      socket.on('game-ended', (data) => {
        endGame(data);
      });

      socket.on('error', (message) => {
        alert('Error: ' + message);
      });
    }

    function updateConnectionStatus(connected) {
      const statusEl = document.getElementById('connectionStatus');
      if (connected) {
        statusEl.textContent = '🟢 Conectado';
        statusEl.className = 'connection-status status-connected';
      } else {
        statusEl.textContent = '🔴 Desconectado';
        statusEl.className = 'connection-status status-disconnected';
      }
    }

    function joinGame() {
      playerName = document.getElementById('playerName').value.trim();
      roomCode = document.getElementById('roomCode').value.trim().toUpperCase();

      if (!playerName || !roomCode) {
        alert('Por favor completa todos los campos');
        return;
      }

      document.getElementById('waitingArea').style.display = 'block';
      socket.emit('join-room', roomCode, playerName);
    }

    function updatePlayersList(players) {
      const list = document.getElementById('playersList');
      list.innerHTML = players.map(p =>
        `<div class="player-badge">
          <strong>${p.name}</strong><br>
          <small>${p.role}</small>
        </div>`
      ).join('');
    }

    function startGame(data) {
      gameState.suspects = data.suspects;

      // Render mystery header
      const headerEl = document.getElementById('mysteryHeader');
      headerEl.innerHTML = `
        <h2>${data.mystery.title}</h2>
        <p>📍 ${data.mystery.setting}</p>
      `;

      // Render clues (all as undiscovered)
      renderClues();

      // Render suspects
      renderSuspects();

      // Hide lobby and show game
      document.getElementById('lobby').style.display = 'none';
      document.getElementById('game').style.display = 'grid';
    }

    function renderClues() {
      const container = document.getElementById('cluesContainer');
      container.innerHTML = [
        { id: 1, title: "Grabación de seguridad borrosa", location: "Cuarto de seguridad", importance: "media" },
        { id: 2, title: "Puerta de servicio abierta", location: "Jardín del museo", importance: "alta" },
        { id: 3, title: "Nota manuscrita", location: "Vitrina de la joya", importance: "media" },
        { id: 4, title: "Boleta de depósito", location: "Banco - registros", importance: "alta" },
        { id: 5, title: "Reloj de bolsillo antiguo", location: "Escalera de emergencia", importance: "media" },
        { id: 6, title: "Email encriptado", location: "Laptop de Sofia (incautada)", importance: "alta" },
        { id: 7, title: "Testimonio de camarero", location: "Entrevista de testigo", importance: "media" },
        { id: 8, title: "Llamadas telefónicas", location: "Registros telefónicos", importance: "media" }
      ].map(clue => `
        <div class="clue-card" id="clue-${clue.id}" onclick="discoverClue(${clue.id})">
          <div class="clue-title">🔍 ${clue.title}</div>
          <div class="clue-location">📍 ${clue.location}</div>
          <div class="clue-content" id="clue-content-${clue.id}">
            <p style="margin-top: 10px; color: #ffd700;">Importancia: <span class="importance-${clue.importance}">${clue.importance.toUpperCase()}</span></p>
          </div>
        </div>
      `).join('');

      updateGameStats();
    }

    function discoverClue(clueId) {
      if (!gameState.discoveredClues.has(clueId)) {
        socket.emit('discover-clue', clueId);
      }
    }

    function handleClueDiscovered(data) {
      gameState.discoveredClues.add(data.clue.id);

      const clueEl = document.getElementById(`clue-${data.clue.id}`);
      clueEl.classList.add('discovered');

      const contentEl = document.getElementById(`clue-content-${data.clue.id}`);
      const descriptionEl = contentEl.querySelector('p');
      if (!descriptionEl) {
        const p = document.createElement('p');
        p.textContent = data.clue.description;
        p.style.marginTop = '10px';
        contentEl.appendChild(p);
      }

      const byEl = clueEl.querySelector('.discovered-by');
      if (!byEl) {
        const div = document.createElement('div');
        div.className = 'discovered-by';
        div.textContent = `Descubierto por: ${data.discoveredBy}`;
        clueEl.appendChild(div);
      }

      updateGameStats();
    }

    function renderSuspects() {
      const container = document.getElementById('suspectsContainer');
      container.innerHTML = gameState.suspects.map(suspect => `
        <div class="suspect-card" id="suspect-${suspect.id}">
          <div class="suspect-name">${suspect.name}</div>
          <div class="suspect-role">👔 ${suspect.role}</div>
          <div class="suspect-alibi">
            <strong>Coartada:</strong> "${suspect.alibi}"
          </div>
          <button class="btn-interrogate" onclick="interrogate(${suspect.id})">
            🔎 Interrogar
          </button>
          <div class="suspect-secrets" id="secrets-${suspect.id}"></div>
          <div class="suspect-motive" id="motive-${suspect.id}"></div>
          <button class="btn-accuse" onclick="makeAccusation(${suspect.id})">
            ⚖️ Acusar
          </button>
        </div>
      `).join('');
    }

    function interrogate(suspectId) {
      socket.emit('interrogate', suspectId);
    }

    function handleInterrogation(data) {
      gameState.interrogations.add(data.suspectId);

      const card = document.getElementById(`suspect-${data.suspectId}`);
      card.classList.add('interrogated');

      const secretsEl = document.getElementById(`secrets-${data.suspectId}`);
      secretsEl.innerHTML = `
        <strong>🔓 Secretos revelados:</strong>
        ${data.secrets.map(s => `<div class="secret-item">• ${s}</div>`).join('')}
      `;

      const motiveEl = document.getElementById(`motive-${data.suspectId}`);
      motiveEl.innerHTML = `<strong>💭 Móvil:</strong> ${data.motive}`;
    }

    function makeAccusation(suspectId) {
      const confirmed = confirm(`¿Acusas a ${gameState.suspects.find(s => s.id === suspectId).name}?`);
      if (confirmed) {
        socket.emit('make-accusation', suspectId);
      }
    }

    function endGame(data) {
      document.getElementById('game').style.display = 'none';

      const correctClues = [2, 3, 5, 6, 8]; // Las pistas correctas
      const playerCorrectClues = Array.from(gameState.discoveredClues).filter(id => correctClues.includes(id));

      let html = `
        <h2 class="${data.isCorrect ? 'result-correct' : 'result-wrong'}">
          ${data.isCorrect ? '✅ ¡GANASTE!' : '❌ ACUSACIÓN INCORRECTA'}
        </h2>

        <div class="accusation-banner">
          ${data.accusedBy} acusó a: <strong>${data.accusedName}</strong>
        </div>
      `;

      if (!data.isCorrect) {
        html += `
          <div class="result-content">
            <h3>La respuesta correcta era:</h3>
            <p><strong>${data.correctCulprit}</strong></p>
          </div>
        `;
      }

      html += `
        <div class="result-content">
          <h3>📜 La Verdad:</h3>
          <p>${data.explanation}</p>
        </div>

        <div class="result-content">
          <h3>📋 Pistas Clave (Las que encontraron: ${playerCorrectClues.length}/${correctClues.length}):</h3>
          <ul>
            <li>Puerta de servicio abierta (forzada)</li>
            <li>Nota manuscrita en la vitrina</li>
            <li>Reloj de bolsillo de Sofia</li>
            <li>Email encriptado en su laptop</li>
            <li>Llamadas a Ámsterdam</li>
          </ul>
        </div>

        <button class="btn-primary btn-new-game" onclick="location.reload()">
          🎮 Nuevo Juego
        </button>
      `;

      document.getElementById('endGameContent').innerHTML = html;
      document.getElementById('end-game').style.display = 'block';
    }

    function updateGameStats() {
      const stats = document.getElementById('gameStats');
      const cluesFound = gameState.discoveredClues.size;
      const totalClues = 8;

      stats.innerHTML = `
        <div style="color: #c0c0c0;">
          <p><strong>Pistas encontradas:</strong><br><span style="color: #ffd700;">${cluesFound}/${totalClues}</span></p>
